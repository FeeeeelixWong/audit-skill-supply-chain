name: Validate

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - run: python3 tools/validate_skill.py
      - run: python3 skills/audit-skill-supply-chain/scripts/audit_skill.py bootstrap --help
      - run: python3 tools/create_cli_adapter.py --target all --dry-run
      - run: python3 skills/audit-skill-supply-chain/scripts/scan_installed_skills.py --path skills --fail-on critical
      - run: python3 -m unittest discover -s tests -p 'test_*.py'
      - run: python3 tools/package_release.py --version 0.0.0-ci
